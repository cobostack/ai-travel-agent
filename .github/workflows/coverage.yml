name: 📊 Coverage Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  COVERAGE_GIST_ID: ${{ vars.COVERAGE_GIST_ID }}
  HAS_COVERAGE_BADGE_CONFIG: ${{ secrets.GIST_SECRET != '' && vars.COVERAGE_GIST_ID != '' }}

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: 🔨 Build and test with coverage
      run: |
        mvn clean test jacoco:report --batch-mode
        
    - name: 📈 Parse coverage report
      id: coverage
      run: |
        # 读取 JaCoCo 报告
        COVERAGE_FILE="target/site/jacoco/index.html"
        if [ -f "$COVERAGE_FILE" ]; then
          # 提取覆盖率数据
          INSTRUCTION=$(grep -oP 'Total[^%]+%' "$COVERAGE_FILE" | head -1 | grep -oP '\d+%' || echo "N/A")
          BRANCH=$(grep -oP 'Total[^%]+%' "$COVERAGE_FILE" | head -2 | tail -1 | grep -oP '\d+%' || echo "N/A")
          LINE=$(grep -oP 'Total[^%]+%' "$COVERAGE_FILE" | head -3 | tail -1 | grep -oP '\d+%' || echo "N/A")
          
          echo "instruction_coverage=$INSTRUCTION" >> $GITHUB_OUTPUT
          echo "branch_coverage=$BRANCH" >> $GITHUB_OUTPUT
          echo "line_coverage=$LINE" >> $GITHUB_OUTPUT
        else
          echo "instruction_coverage=N/A" >> $GITHUB_OUTPUT
          echo "branch_coverage=N/A" >> $GITHUB_OUTPUT
          echo "line_coverage=N/A" >> $GITHUB_OUTPUT
        fi
        
    - name: 🎨 Generate coverage badge
      if: ${{ env.HAS_COVERAGE_BADGE_CONFIG == 'true' }}
      uses: schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.GIST_SECRET }}
        gistID: ${{ env.COVERAGE_GIST_ID }}
        filename: ai-travel-agent-coverage.json
        label: Coverage
        message: ${{ steps.coverage.outputs.line_coverage }}
        color: ${{ steps.coverage.outputs.line_coverage >= '80' && 'brightgreen' || steps.coverage.outputs.line_coverage >= '60' && 'yellow' || 'red' }}
        
    - name: 📤 Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: target/site/jacoco/
        
    - name: 💬 Create coverage summary
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // 读取 JaCoCo CSV 报告
          const csvPath = 'target/site/jacoco/jacoco.csv';
          let summary = '## 📊 Coverage Report\n\n';
          
          if (fs.existsSync(csvPath)) {
            const csv = fs.readFileSync(csvPath, 'utf8');
            const lines = csv.split('\n').filter(line => line.trim());
            
            summary += '| Package | Instructions | Branches | Lines |\n';
            summary += '|---------|-------------|----------|-------|\n';
            
            // 跳过表头，取前10个包
            for (let i = 1; i < Math.min(lines.length, 11); i++) {
              const cols = lines[i].split(',');
              if (cols.length >= 5) {
                const pkg = cols[1].replace(/"/g, '');
                const instr = cols[4];
                const branch = cols[6];
                const line = cols[8];
                summary += `| ${pkg} | ${instr} | ${branch} | ${line} |\n`;
              }
            }
          } else {
            summary += 'Coverage report not found.\n';
          }
          
          // 写入到 job summary
          core.summary.addRaw(summary).write();
