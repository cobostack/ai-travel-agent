name: 🚀 CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    # 2. 设置 JDK 17
    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    # 3. 编译和测试
    - name: 🔨 Build with Maven
      run: mvn clean compile --batch-mode
      
    # 4. 运行测试
    - name: 🧪 Run tests
      run: mvn test --batch-mode
      
    # 5. 生成测试报告
    - name: 📊 Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Maven Tests
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: false
        
    # 6. 生成覆盖率报告
    - name: 📈 Generate coverage report
      run: mvn jacoco:report --batch-mode
      
    # 7. 上传覆盖率报告到 Codecov
    - name: 📤 Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    # 8. 上传测试报告（Artifact）
    - name: 📦 Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/site/jacoco/
          
    # 9. 评论 PR（如果是 PR）
    - name: 💬 Comment PR with test results
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request' && (success() || failure())
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // 读取测试报告
          const testReportPath = path.join(process.env.GITHUB_WORKSPACE, 'target/surefire-reports');
          let testResults = '';
          
          if (fs.existsSync(testReportPath)) {
            const files = fs.readdirSync(testReportPath).filter(f => f.endsWith('.txt'));
            
            let totalTests = 0;
            let failures = 0;
            let errors = 0;
            
            files.forEach(file => {
              const content = fs.readFileSync(path.join(testReportPath, file), 'utf8');
              const match = content.match(/Tests run: (\d+), Failures: (\d+), Errors: (\d+)/);
              if (match) {
                totalTests += parseInt(match[1]);
                failures += parseInt(match[2]);
                errors += parseInt(match[3]);
              }
            });
            
            const successRate = totalTests > 0 ? ((totalTests - failures - errors) / totalTests * 100).toFixed(2) : 0;
            const status = failures === 0 && errors === 0 ? '✅ PASSED' : '❌ FAILED';
            
            testResults = `## 🧪 Test Results ${status}
            
            | Metric | Value |
            |--------|-------|
            | **Total Tests** | ${totalTests} |
            | **Passed** | ${totalTests - failures - errors} |
            | **Failures** | ${failures} |
            | **Errors** | ${errors} |
            | **Success Rate** | ${successRate}% |
            `;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: testResults
          });
